<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 및 장바구니</title>
    <!-- Firebase SDK -->
    <script type="module">
        // Firebase SDK를 모듈로 가져오기
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js";

        // Firebase 초기화
        const firebaseConfig = {
            apiKey: "AIzaSyBzEjwURyiDcmWrM_vdqANVN9WxJQr6d08",
            authDomain: "khsparty.firebaseapp.com",
            databaseURL: "https://khsparty-default-rtdb.firebaseio.com",
            projectId: "khsparty",
            storageBucket: "khsparty.firebasestorage.app",
            messagingSenderId: "658831845381",
            appId: "1:658831845381:web:7176c6d631807e5b5ed46c",
            measurementId: "G-NCE5618PZY"
        };

        // Firebase 앱 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 이메일 유효성 검사 함수
        function validateEmail(email) {
            const re = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return re.test(String(email).toLowerCase());
        }

        // 회원가입 함수
        window.signUp = function() {
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const username = document.getElementById("username").value;

            // 이메일 유효성 검사
            if (!validateEmail(email)) {
                alert("유효한 이메일을 쓰세요.");
                return; // 유효하지 않은 경우 함수 종료
            }

            createUserWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // 회원가입 성공
                    const user = userCredential.user;
                    console.log("회원가입 성공:", user);
                    alert("회원가입이 완료되었습니다.");

                    // 사용자 정보를 Realtime Database에 저장
                    saveUserData(user.uid, username, email);
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;

                    if (errorCode === 'auth/email-already-in-use') {
                        alert("이미 회원가입된 이메일입니다.");
                    } else {
                        console.error("회원가입 실패:", errorMessage);
                        alert(errorMessage);
                    }
                    location.reload(); // 오류 발생 시 새로 고침
                });
        };

        // 사용자 정보를 Realtime Database에 저장
        function saveUserData(userId, username, email) {
            set(ref(database, 'users/' + userId), {
                username: username,
                email: email,
                createdAt: new Date().toISOString(),
                cartTotal: 0 // 초기 장바구니 금액
            })
            .then(() => {
                console.log("사용자 정보 저장 성공");
            })
            .catch((error) => {
                console.error("사용자 정보 저장 실패:", error);
            });
        }

        // 로그인 함수
        window.login = function() {
            const email = document.getElementById("loginEmail").value;
            const password = document.getElementById("loginPassword").value;

            signInWithEmailAndPassword(auth, email, password)
                .then((userCredential) => {
                    // 로그인 성공
                    const user = userCredential.user;
                    console.log("로그인 성공:", user);
                    alert("로그인이 완료되었습니다.");
                    // 로그인 후 장바구니 금액 로드
                    loadCartTotal();
                })
                .catch((error) => {
                    const errorCode = error.code;
                    const errorMessage = error.message;
                    console.error("로그인 실패:", errorMessage);
                    alert(errorMessage);
                });
        };

        // 로그아웃 함수
        window.logout = function() {
            signOut(auth).then(() => {
                console.log("로그아웃 성공");
                alert("로그아웃되었습니다.");
                location.reload(); // 페이지 새로 고침
            }).catch((error) => {
                console.error("로그아웃 실패:", error);
            });
        };

        // 장바구니 금액 추가 함수
        window.addToCart = function() {
            const userId = auth.currentUser.uid; // 현재 로그인한 사용자 ID
            const amount = parseFloat(document.getElementById("cartAmount").value); // 추가할 금액

            if (isNaN(amount) || amount <= 0) {
                alert("유효한 금액을 입력하세요.");
                return;
            }

            // 사용자 데이터 로드
            const userRef = ref(database, 'users/' + userId);
            get(child(userRef, 'cartTotal')).then((snapshot) => {
                if (snapshot.exists()) {
                    const currentTotal = snapshot.val();
                    const newTotal = currentTotal + amount;

                    // 장바구니 금액 업데이트
                    set(ref(database, 'users/' + userId), {
                        cartTotal: newTotal
                    })
                    .then(() => {
                        console.log("장바구니 금액 업데이트 성공");
                        alert("장바구니 금액이 업데이트되었습니다.");
                    })
                    .catch((error) => {
                        console.error("장바구니 금액 업데이트 실패:", error);
                    });
                } else {
                    console.log("사용자 데이터 없음");
                }
            }).catch((error) => {
                console.error("데이터 로드 실패:", error);
            });
        };

        // 장바구니 금액 로드 함수
        window.loadCartTotal = function() {
            const userId = auth.currentUser.uid; // 현재 로그인한 사용자 ID

            const userRef = ref(database, 'users/' + userId);
            get(child(userRef, 'cartTotal')).then((snapshot) => {
                if (snapshot.exists()) {
                    const cartTotal = snapshot.val();
                    alert("현재 장바구니 금액: " + cartTotal);
                } else {
                    console.log("사용자 데이터 없음");
                }
            }).catch((error) => {
                console.error("데이터 로드 실패:", error);
            });
        };

        // 사용자 상태 변화 감지
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // 사용자 로그인 상태
                console.log("사용자 로그인:", user);
                document.getElementById("loggedIn").style.display = "block";
                document.getElementById("loggedOut").style.display = "none";
            } else {
                // 사용자 로그아웃 상태
                console.log("사용자 로그아웃");
                document.getElementById("loggedIn").style.display = "none";
                document.getElementById("loggedOut").style.display = "block";
            }
        });
    </script>
</head>
<body>
    <h1>회원가입 및 장바구니</h1>

    <div id="loggedOut">
        <h2>회원가입</h2>
        <input type="text" id="username" placeholder="사용자 이름" required />
        <input type="email" id="email" placeholder="이메일" required />
        <input type="password" id="password" placeholder="비밀번호" required />
        <button onclick="signUp()">회원가입</button>

        <h2>로그인</h2>
        <input type="email" id="loginEmail" placeholder="이메일" required />
        <input type="password" id="loginPassword" placeholder="비밀번호" required />
        <button onclick="login()">로그인</button>
    </div>

    <div id="loggedIn" style="display:none;">
        <h2>장바구니</h2>
        <input type="number" id="cartAmount" placeholder="장바구니 금액" required />
        <button onclick="addToCart()">장바구니에 추가</button>
        <button onclick="loadCartTotal()">장바구니 금액 로드</button>
        <button onclick="logout()">로그아웃</button>
    </div>
</body>
</html>
