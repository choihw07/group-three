<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Main Screen</title>
   <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
   <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>
   <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database.js"></script>
   <link rel="stylesheet" href="/make/styles.css">
   <style>
      body {
         margin: 0;
         padding: 0;
         display: flex;
         flex-direction: column;
         align-items: center;
         justify-content: center;
         height: 100vh;
         width: 100vw;
         aspect-ratio: 16 / 9;
         overflow: hidden;
      }
      main {
         margin-top: 100px; /* 기존 간격보다 넓게 조정 */
      }
   </style>
</head>
<body>
   <header>
      <span class="balance">잔액: 닢</span>
      <button class="menu">☰</button>
      <div class="menu-bar">
         <ul>
            <li>프로필</li>
            <li id="auth-button">로그인</li>
         </ul>
      </div>
   </header>
   <main>
      <button class="button" data-url="/map">외부 지도 확인</button>
      <button class="button" data-url="/floor">내부 지도 확인</button>
      <button class="button" data-url="/booth">부스 확인</button>
      <button class="button" data-url="/schedule">행사 일정</button>
   </main>

   <script src="/make/main.js"></script>
</body>
</html>
